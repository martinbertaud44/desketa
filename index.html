<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  color: #f5f0e8;
  font-family: serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.stripes {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  height: 48px;
}
.stripes div { flex: 1; }
.stripes div:nth-child(odd) { background: #f5f0e8; }
.stripes div:nth-child(even) { background: #0a0a0a; }

.logo {
  width: 110px;
  height: 110px;
  margin-bottom: 24px;
  animation: pulseIn 0.8s ease forwards;
}

@keyframes pulseIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.title {
  font-size: 2rem;
  color: #c9a84c;
  letter-spacing: 0.12em;
  font-weight: bold;
  margin-bottom: 6px;
}

.sub {
  font-style: italic;
  color: rgba(245,240,232,0.4);
  font-size: 0.95rem;
  margin-bottom: 40px;
}

.btn {
  padding: 0.9rem 2.5rem;
  background: #c9a84c;
  color: #0a0a0a;
  font-family: serif;
  font-size: 1rem;
  font-weight: bold;
  letter-spacing: 0.1em;
  border: none;
  cursor: pointer;
  border-radius: 2px;
  margin-bottom: 1rem;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}

.btn:hover { background: #e8c96a; }

.devise {
  font-style: italic;
  color: rgba(201,168,76,0.35);
  font-size: 0.75rem;
  text-align: center;
  padding: 0 2rem;
  margin-top: 2rem;
  opacity: 0;
  animation: fadeIn 1s ease forwards 0.8s;
}

@keyframes fadeIn { to { opacity: 1; } }

.bzh {
  position: absolute;
  bottom: 20px;
  font-size: 0.7rem;
  color: rgba(245,240,232,0.15);
  letter-spacing: 0.15em;
}

.bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: #c9a84c;
}
</style>
